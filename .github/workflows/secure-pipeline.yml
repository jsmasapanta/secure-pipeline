name: Secure CI/CD Pipeline

on:
  pull_request:
    branches:
      - test
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security-scan:
    name: "Etapa 1 - Analisis de Vulnerabilidades ML"
    runs-on: ubuntu-latest
    outputs:
      is_vulnerable: ${{ steps.classify.outputs.is_vulnerable }}
      vuln_probability: ${{ steps.classify.outputs.vuln_probability }}
      prediction: ${{ steps.classify.outputs.prediction }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del modelo
        run: pip install scikit-learn xgboost numpy joblib pandas

      - name: Notificacion Telegram - Inicio de analisis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Inicio de Analisis de Seguridad - PR #${{ github.event.pull_request.number }} por ${{ github.event.pull_request.user.login }}" \
            -d parse_mode="Markdown"

      - name: Obtener diff del Pull Request
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          cat /tmp/pr.diff

      - name: Clasificar codigo con modelo ML
        id: classify
        run: |
          python model/classify.py --diff /tmp/pr.diff --output json > /tmp/result.json || true
          cat /tmp/result.json
          IS_VULNERABLE=$(python -c "import json; r=json.load(open('/tmp/result.json')); print(str(r['is_vulnerable']).lower())")
          PROBABILITY=$(python -c "import json; r=json.load(open('/tmp/result.json')); print(r['vulnerability_probability'])")
          PREDICTION=$(python -c "import json; r=json.load(open('/tmp/result.json')); print(r['prediction'])")
          echo "is_vulnerable=${IS_VULNERABLE}" >> $GITHUB_OUTPUT
          echo "vuln_probability=${PROBABILITY}" >> $GITHUB_OUTPUT
          echo "prediction=${PREDICTION}" >> $GITHUB_OUTPUT

      - name: Publicar resultado en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('/tmp/result.json', 'utf8'));
            const isVuln = result.is_vulnerable;
            const prob = (result.vulnerability_probability * 100).toFixed(1);
            const conf = (result.confidence * 100).toFixed(1);
            const vulnTypes = result.vulnerability_types || [];
            const features = result.features_summary || {};
            const statusEmoji = isVuln ? 'VULNERABLE' : 'SEGURO';
            let body = `## Resultado del Analisis de Seguridad: **${statusEmoji}**\n\n`;
            body += `| Metrica | Valor |\n|---|---|\n`;
            body += `| Prediccion | \`${statusEmoji}\` |\n`;
            body += `| Probabilidad de vulnerabilidad | \`${prob}%\` |\n`;
            body += `| Confianza del modelo | \`${conf}%\` |\n`;
            body += `| Funciones peligrosas | \`${features.dangerous_functions || 0}\` |\n`;
            body += `| Sanitizacion presente | \`${features.sanitization_present ? 'Si' : 'No'}\` |\n`;
            body += `| Patrones SQL Injection | \`${features.sql_injection_patterns || 0}\` |\n\n`;
            if (isVuln) {
              body += `### Vulnerabilidades Detectadas\n\n`;
              if (vulnTypes.length > 0) {
                vulnTypes.forEach(v => { body += `- ${v}\n`; });
              }
              body += `\n### Accion Requerida\n`;
              body += `Este PR ha sido bloqueado automaticamente.\n`;
              body += `> Analisis realizado por modelo Random Forest`;
            } else {
              body += `### El codigo paso el analisis de seguridad\n`;
              body += `El pipeline continuara con las pruebas unitarias.\n`;
              body += `> Analisis realizado por modelo Random Forest`;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Etiquetar PR
        uses: actions/github-script@v7
        with:
          script: |
            const isVuln = '${{ steps.classify.outputs.is_vulnerable }}' === 'true';
            const labelName = isVuln ? 'fixing-required' : 'security-approved';
            const labelColor = isVuln ? 'ff0000' : '00ff00';
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: labelName,
                color: labelColor,
              });
            } catch(e) {}
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [labelName]
            });

      - name: Crear Issue si hay vulnerabilidad
        if: steps.classify.outputs.is_vulnerable == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('/tmp/result.json', 'utf8'));
            const vulnTypes = result.vulnerability_types || [];
            const issueBody = `## Vulnerabilidad Detectada en PR #${{ github.event.pull_request.number }}\n\n**PR:** ${{ github.event.pull_request.title }}\n**Autor:** @${{ github.event.pull_request.user.login }}\n\n### Vulnerabilidades\n${vulnTypes.map(v => '- ' + v).join('\n') || '- Patron inseguro detectado'}\n\n### Probabilidad\n${(result.vulnerability_probability * 100).toFixed(1)}%\n\n> Issue creada automaticamente por el pipeline de seguridad`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[SECURITY] Vulnerabilidad en PR #${{ github.event.pull_request.number }}`,
              body: issueBody,
              labels: ['fixing-required', 'bug']
            });

      - name: Notificacion Telegram - Resultado
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          IS_VULN="${{ steps.classify.outputs.is_vulnerable }}"
          if [ "$IS_VULN" = "true" ]; then
            STATUS="VULNERABLE - Merge bloqueado"
          else
            STATUS="SEGURO - Continuando pipeline"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Resultado: ${STATUS} - PR #${{ github.event.pull_request.number }}" \
            -d parse_mode="Markdown"

      - name: Bloquear pipeline si es VULNERABLE
        if: steps.classify.outputs.is_vulnerable == 'true'
        run: |
          echo "CODIGO VULNERABLE DETECTADO"
          exit 1

  run-tests:
    name: "Etapa 2 - Pruebas Unitarias"
    runs-on: ubuntu-latest
    needs: security-scan
    if: needs.security-scan.outputs.is_vulnerable == 'false'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install flask pytest pytest-cov

      - name: Notificacion Telegram - Inicio pruebas
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Iniciando pruebas unitarias - PR #${{ github.event.pull_request.number }}"

      - name: Ejecutar pruebas con pytest
        id: tests
        run: |
          cd app
          python -m pytest tests/ -v --tb=short

      - name: Notificacion Telegram - Resultado pruebas
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ steps.tests.outcome }}" = "success" ]; then
            STATUS="Todas las pruebas pasaron"
          else
            STATUS="Pruebas fallidas"
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Resultado pruebas: ${STATUS} - PR #${{ github.event.pull_request.number }}"

  deploy:
    name: "Etapa 3 - Deploy a Produccion"
    runs-on: ubuntu-latest
    needs: [security-scan, run-tests]
    if: needs.security-scan.outputs.is_vulnerable == 'false' && needs.run-tests.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Notificacion Telegram - Iniciando deploy
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Iniciando deploy a produccion - PR #${{ github.event.pull_request.number }}"

      - name: Deploy en Render
        id: deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -s -X POST "$RENDER_DEPLOY_HOOK"
            echo "Deploy iniciado en Render"
          fi

      - name: Notificacion Telegram - Deploy exitoso
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Deploy exitoso en produccion - ${{ secrets.RENDER_APP_URL }}"
