name: Secure CI/CD Pipeline

on:
  pull_request:
    branches:
      - test
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:

  security-scan:
    name: "Etapa 1 - Analisis de Vulnerabilidades ML"
    runs-on: ubuntu-latest
    outputs:
      is_vulnerable: ${{ steps.classify.outputs.is_vulnerable }}
      vuln_probability: ${{ steps.classify.outputs.vuln_probability }}
      prediction: ${{ steps.classify.outputs.prediction }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias del modelo
        run: pip install scikit-learn xgboost numpy joblib pandas

      - name: Notificacion Telegram - Inicio de analisis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Inicio de Analisis de Seguridad - PR #${{ github.event.pull_request.number }} por ${{ github.event.pull_request.user.login }}" \
            -d parse_mode="Markdown"

